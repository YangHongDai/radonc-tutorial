<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=index.html">
<title>Key Trials Moved - OncoBeam</title>
<link rel="stylesheet" href="styles.css">
<script>
window.location.replace('index.html');
</script>
  <script>
    (function () {
      var lang = "zh";
      try {
        lang = localStorage.getItem("radonc-language") === "en" ? "en" : "zh";
      } catch (error) {
        lang = "zh";
      }
      var root = document.documentElement;
      var initial = (root.lang || "").toLowerCase().indexOf("en") === 0 ? "en" : "zh";
      root.dataset.uiLang = lang;
      root.lang = lang === "en" ? "en" : "zh-TW";
      if (lang !== initial) {
        root.classList.add("i18n-pending");
      }
    })();
  </script>
  <style>
    html.i18n-pending body { visibility: hidden; }
    html[data-ui-lang="zh"] [data-lang="en"],
    html[data-ui-lang="en"] [data-lang="zh"] { display: none !important; }
  </style>
</head>
<body>
<main class="content-wrap" style="padding-top:120px">
  <section class="section">
    <div class="section-label" data-zh="已整合" data-en="INTEGRATED">已整合</div>
    <h1 data-zh="關鍵試驗已整合到各章節" data-en="Key trials are now integrated into each chapter">關鍵試驗已整合到各章節</h1>
    <p data-lang="zh">此獨立頁面已停用，請從首頁進入各癌別主題查看整合後的關鍵試驗內容。</p>
    <p data-lang="en">This standalone page has been retired. Open a disease-site chapter from the home page to view the integrated key trials content.</p>
    <p><a href="index.html" data-zh="返回首頁" data-en="Back to home">Back to home</a></p>
  </section>
</main>
<script src="i18n.js"></script>
</body>
</html>
